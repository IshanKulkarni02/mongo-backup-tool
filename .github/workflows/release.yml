name: Release build

# Builds the mongobak CLI (all platforms) and the desktop app (.dmg for
# macOS, NSIS installer .exe for Windows, binary for Linux) on every
# version-tag push, and uploads them as workflow artifacts (Actions tab).
#
# Deliberately does NOT auto-publish a public GitHub Release — that's a
# separate, explicit step (`gh release create` with these artifacts, or
# adding a release job here) left for a maintainer to trigger on purpose.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  cli:
    name: CLI (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            name: mongobak-darwin-arm64
          - goos: darwin
            goarch: amd64
            name: mongobak-darwin-amd64
          - goos: windows
            goarch: amd64
            name: mongobak-windows-amd64.exe
          - goos: linux
            goarch: amd64
            name: mongobak-linux-amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -o "dist/${{ matrix.name }}" .

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.name }}

  desktop:
    name: Desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Build (macOS -> .app + .dmg)
        if: runner.os == 'macOS'
        working-directory: desktop
        run: |
          wails build -platform darwin/universal
          chmod +x build/scripts/package-dmg.sh
          ./build/scripts/package-dmg.sh

      - uses: actions/upload-artifact@v4
        if: runner.os == 'macOS'
        with:
          name: mongobak.dmg
          path: desktop/build/bin/mongobak.dmg

      - name: Build (Windows -> NSIS installer)
        if: runner.os == 'Windows'
        working-directory: desktop
        run: wails build -platform windows/amd64 -nsis

      - uses: actions/upload-artifact@v4
        if: runner.os == 'Windows'
        with:
          name: mongobak-setup.exe
          path: desktop/build/bin/*installer.exe

      - name: Build (Linux -> binary)
        if: runner.os == 'Linux'
        working-directory: desktop
        run: wails build -platform linux/amd64

      - uses: actions/upload-artifact@v4
        if: runner.os == 'Linux'
        with:
          name: mongobak-desktop-linux-amd64
          path: desktop/build/bin/mongobak
