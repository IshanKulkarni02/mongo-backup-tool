version: "3.8"

# Local Postgres/MySQL instances for manual testing and the optional
# integration suite (internal/engine/postgres, internal/engine/mysql —
# build-tagged `integration`, not run by `go test ./...`). Not started
# automatically by anything in this repo.
#
# Usage:
#   docker compose -f docker-compose.test.yml up -d
#   go test -tags=integration ./internal/engine/postgres/... ./internal/engine/mysql/...
#   docker compose -f docker-compose.test.yml down -v   # tear down + wipe data

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: mongobak
      POSTGRES_PASSWORD: mongobak
      POSTGRES_DB: mongobak_test
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mongobak -d mongobak_test"]
      interval: 2s
      timeout: 5s
      retries: 15

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: mongobak
      MYSQL_DATABASE: mongobak_test
      MYSQL_USER: mongobak
      MYSQL_PASSWORD: mongobak
    ports:
      - "53306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u mongobak -pmongobak"]
      interval: 2s
      timeout: 5s
      retries: 15
